<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EGC Photo Editor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            background: #181825;
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
            border-bottom: 1px solid #313244;
        }
        .toolbar h1 {
            color: #89b4fa;
            font-size: 1.2rem;
            margin-right: 2rem;
        }
        .btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: background 0.2s;
            background: #313244;
            color: #cdd6f4;
        }
        .btn:hover { background: #45475a; }
        .btn-primary { background: #89b4fa; color: #1e1e2e; }
        .btn-primary:hover { background: #74a8fc; }

        .workspace {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        .sidebar {
            width: 260px;
            background: #181825;
            padding: 1rem;
            overflow-y: auto;
            border-right: 1px solid #313244;
        }
        .sidebar h3 {
            color: #a6adc8;
            font-size: 0.8rem;
            text-transform: uppercase;
            margin: 1rem 0 0.5rem;
        }
        .sidebar h3:first-child { margin-top: 0; }

        .filter-group {
            margin-bottom: 0.5rem;
        }
        .filter-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: #bac2de;
        }
        .filter-group input[type="range"] {
            width: 100%;
            accent-color: #89b4fa;
        }

        .canvas-area {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            background: #11111b;
            position: relative;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            border-radius: 4px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .placeholder {
            color: #585b70;
            text-align: center;
        }
        .placeholder p { font-size: 1.2rem; margin-bottom: 0.5rem; }

        .status-bar {
            background: #181825;
            padding: 0.4rem 1.5rem;
            font-size: 0.75rem;
            color: #a6adc8;
            border-top: 1px solid #313244;
            display: flex;
            gap: 2rem;
        }

        .color-picker-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .color-picker-group input[type="color"] {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .tool-btn {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #313244;
            border: none;
            color: #cdd6f4;
            cursor: pointer;
            font-size: 1.1rem;
        }
        .tool-btn:hover { background: #45475a; }
        .tool-btn.active { background: #89b4fa; color: #1e1e2e; }

        .draw-tools {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        @media (max-width: 768px) {
            .workspace { flex-direction: column; }
            .sidebar { width: 100%; max-height: 200px; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>EGC Photo Editor</h1>
        <input type="file" id="file-input" accept="image/*" style="display:none;">
        <button class="btn btn-primary" onclick="document.getElementById('file-input').click()">Ouvrir</button>
        <button class="btn" onclick="saveImage()">Sauvegarder</button>
        <button class="btn" onclick="undo()">Annuler</button>
        <button class="btn" onclick="redo()">Refaire</button>
        <button class="btn" onclick="resetFilters()">Réinitialiser</button>
    </div>

    <div class="workspace">
        <div class="sidebar">
            <h3>Filtres</h3>
            <div class="filter-group">
                <label><span>Luminosité</span><span id="val-brightness">100%</span></label>
                <input type="range" id="brightness" min="0" max="200" value="100" oninput="applyFilters()">
            </div>
            <div class="filter-group">
                <label><span>Contraste</span><span id="val-contrast">100%</span></label>
                <input type="range" id="contrast" min="0" max="200" value="100" oninput="applyFilters()">
            </div>
            <div class="filter-group">
                <label><span>Saturation</span><span id="val-saturate">100%</span></label>
                <input type="range" id="saturate" min="0" max="200" value="100" oninput="applyFilters()">
            </div>
            <div class="filter-group">
                <label><span>Flou</span><span id="val-blur">0px</span></label>
                <input type="range" id="blur" min="0" max="20" value="0" oninput="applyFilters()">
            </div>
            <div class="filter-group">
                <label><span>Teinte</span><span id="val-hue">0°</span></label>
                <input type="range" id="hue" min="0" max="360" value="0" oninput="applyFilters()">
            </div>
            <div class="filter-group">
                <label><span>Niveaux de gris</span><span id="val-grayscale">0%</span></label>
                <input type="range" id="grayscale" min="0" max="100" value="0" oninput="applyFilters()">
            </div>
            <div class="filter-group">
                <label><span>Sépia</span><span id="val-sepia">0%</span></label>
                <input type="range" id="sepia" min="0" max="100" value="0" oninput="applyFilters()">
            </div>

            <h3>Outils de dessin</h3>
            <div class="draw-tools">
                <button class="tool-btn active" id="tool-brush" onclick="setTool('brush')" title="Pinceau">✏️</button>
                <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')" title="Gomme">🧹</button>
                <button class="tool-btn" id="tool-line" onclick="setTool('line')" title="Ligne">📏</button>
            </div>
            <div class="filter-group" style="margin-top:0.5rem;">
                <label><span>Taille</span><span id="val-brush-size">3px</span></label>
                <input type="range" id="brush-size" min="1" max="50" value="3" oninput="document.getElementById('val-brush-size').textContent=this.value+'px'">
            </div>
            <div class="color-picker-group">
                <label style="font-size:0.85rem;">Couleur :</label>
                <input type="color" id="draw-color" value="#ff0000">
            </div>
        </div>

        <div class="canvas-area" id="canvas-area">
            <div class="placeholder" id="placeholder">
                <p>Glissez une image ici ou cliquez "Ouvrir"</p>
            </div>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>
    </div>

    <div class="status-bar">
        <span id="status-size">Aucune image</span>
        <span id="status-tool">Outil: Pinceau</span>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let img = null;
        let history = [];
        let historyIndex = -1;
        let currentTool = 'brush';
        let drawing = false;
        let lastX = 0, lastY = 0;

        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) loadImage(file);
        });

        const canvasArea = document.getElementById('canvas-area');
        canvasArea.addEventListener('dragover', e => e.preventDefault());
        canvasArea.addEventListener('drop', e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) loadImage(file);
        });

        function loadImage(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                img = new Image();
                img.onload = () => {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    canvas.style.display = 'block';
                    document.getElementById('placeholder').style.display = 'none';
                    document.getElementById('status-size').textContent = `${img.width} x ${img.height}px`;
                    saveState();
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function applyFilters() {
            if (!img) return;
            const b = document.getElementById('brightness').value;
            const c = document.getElementById('contrast').value;
            const s = document.getElementById('saturate').value;
            const bl = document.getElementById('blur').value;
            const h = document.getElementById('hue').value;
            const g = document.getElementById('grayscale').value;
            const sp = document.getElementById('sepia').value;

            document.getElementById('val-brightness').textContent = b + '%';
            document.getElementById('val-contrast').textContent = c + '%';
            document.getElementById('val-saturate').textContent = s + '%';
            document.getElementById('val-blur').textContent = bl + 'px';
            document.getElementById('val-hue').textContent = h + '°';
            document.getElementById('val-grayscale').textContent = g + '%';
            document.getElementById('val-sepia').textContent = sp + '%';

            ctx.filter = `brightness(${b}%) contrast(${c}%) saturate(${s}%) blur(${bl}px) hue-rotate(${h}deg) grayscale(${g}%) sepia(${sp}%)`;
            ctx.drawImage(img, 0, 0);
            ctx.filter = 'none';
            saveState();
        }

        function resetFilters() {
            document.getElementById('brightness').value = 100;
            document.getElementById('contrast').value = 100;
            document.getElementById('saturate').value = 100;
            document.getElementById('blur').value = 0;
            document.getElementById('hue').value = 0;
            document.getElementById('grayscale').value = 0;
            document.getElementById('sepia').value = 0;
            applyFilters();
        }

        function saveState() {
            historyIndex++;
            history = history.slice(0, historyIndex);
            history.push(canvas.toDataURL());
        }

        function undo() {
            if (historyIndex <= 0) return;
            historyIndex--;
            restoreState();
        }

        function redo() {
            if (historyIndex >= history.length - 1) return;
            historyIndex++;
            restoreState();
        }

        function restoreState() {
            const restoreImg = new Image();
            restoreImg.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(restoreImg, 0, 0);
            };
            restoreImg.src = history[historyIndex];
        }

        function saveImage() {
            if (!img) return;
            const link = document.createElement('a');
            link.download = 'egc-edited.png';
            link.href = canvas.toDataURL();
            link.click();
        }

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tool-' + tool).classList.add('active');
            const labels = { brush: 'Pinceau', eraser: 'Gomme', line: 'Ligne' };
            document.getElementById('status-tool').textContent = 'Outil: ' + labels[tool];
        }

        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            [lastX, lastY] = getPos(e);
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const [x, y] = getPos(e);
            const size = document.getElementById('brush-size').value;
            const color = document.getElementById('draw-color').value;

            ctx.lineWidth = size;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            if (currentTool === 'brush') {
                ctx.strokeStyle = color;
                ctx.globalCompositeOperation = 'source-over';
            } else if (currentTool === 'eraser') {
                ctx.strokeStyle = '#ffffff';
                ctx.globalCompositeOperation = 'destination-out';
            }

            if (currentTool !== 'line') {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
            }

            [lastX, lastY] = [x, y];
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!drawing) return;
            drawing = false;
            if (currentTool === 'line') {
                const [x, y] = getPos(e);
                const size = document.getElementById('brush-size').value;
                const color = document.getElementById('draw-color').value;
                ctx.strokeStyle = color;
                ctx.lineWidth = size;
                ctx.globalCompositeOperation = 'source-over';
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
            }
            ctx.globalCompositeOperation = 'source-over';
            saveState();
        });

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return [(e.clientX - rect.left) * scaleX, (e.clientY - rect.top) * scaleY];
        }
    </script>
</body>
</html>
